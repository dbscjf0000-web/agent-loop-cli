name: binary-search
category: search
description: |
  Implement a robust binary search that handles edge cases correctly.
  Tests both correctness (boundary conditions) and runtime characteristics.

task: |
  Implement `binary_search(arr: list[int], target: int) -> int` that returns the index of
  `target` in a sorted list `arr`, or -1 if not found.
  Bonus: handle duplicate values by returning the leftmost index.

success_criteria:
  - axis: correctness
    weight: 0.7
    test: |
      assert binary_search([], 1) == -1
      assert binary_search([1], 1) == 0
      assert binary_search([1], 2) == -1
      assert binary_search([1, 2, 3, 4, 5], 3) == 2
      assert binary_search([1, 2, 3, 4, 5], 1) == 0
      assert binary_search([1, 2, 3, 4, 5], 5) == 4
      assert binary_search([1, 2, 3, 4, 5], 6) == -1
      # leftmost on duplicates
      assert binary_search([1, 2, 2, 2, 3], 2) == 1
      # large input
      arr = list(range(0, 1000000, 2))
      assert binary_search(arr, 999998) == 499999
      assert binary_search(arr, 999999) == -1
  - axis: complexity
    weight: 0.3
    target: "must use O(log n) approach (no linear scan, no .index())"
    measure: source_inspection
    rule: |
      "for " count <= 1 in implementation
      ".index(" not in implementation

budget:
  max_cycles: 3
  max_redo: 2
  max_usd: 0.5
