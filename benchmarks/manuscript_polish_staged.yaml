name: manuscript-polish-staged
category: manuscript
description: |
  v0.13 stage + patch validation on a manuscript-scale task. All sub-tasks
  use the same model (haiku) — purpose is to verify multi-subtask parallel
  staging works, not vendor diversity.

task: |
  당신은 짧은 학술 노트 `paper.md`를 polishing 합니다.

  ## 산출물
  - `workspace/paper.md` (1개 파일)

  ## 초기 draft (P가 stage 1 에서 직접 생성, 또는 stage 1 patch 로 만들기)
  대략 300 단어, 거친 톤. 다음 골격:
    # Title (rough)
    ## Abstract (a) 거친 문장
    ## Methods (a) -> (b) lettering 존재
    ## Results (a) 8/8 catch-rate framing
    ## References [1] [2] bracketed style

  ## 요구 결과 (cycle 1 끝나면)
  - `# `로 시작하는 영문 Title 1줄 (rough 단어 없음)
  - `## Abstract` 섹션 (≥3 문장)
  - `## Methods` 섹션 (a)/b) lettering 제거됨)
  - `## Results` 섹션 (8/8 framing 대신 non-redundancy framing)
  - `## References` 섹션 (Nature superscript numerical, [N] 제거)
  - 본문에 `v0.13` 키워드 등장 (메타정보용)

  ## Sub-tasks (P 가 다음 구조 그대로 plan.md 에 옮기세요)

  ### stage 1 (병렬, 둘 다 새 파일 생성)
  - subtask-1: paper.md 초안 생성
    - goal: 위 골격 그대로의 거친 draft 생성 (search="", replace=골격)
    - acceptance: paper.md 존재 + 5개 헤더 모두 포함
    - verifier: rule
    - check_hint: section="Abstract" in paper.md
    - depends_on:
    - model: claude/haiku-4-5

  ### stage 2 (병렬, stage 1 완료 후)
  - subtask-2: Title polish (rough 제거)
    - goal: 첫 줄 `# Title (rough)` → `# Title` 로 SEARCH/REPLACE
    - acceptance: 첫 줄 정확히 `# Title`
    - verifier: rule
    - depends_on: subtask-1
    - model: claude/haiku-4-5

  - subtask-3: Methods lettering 제거
    - goal: `(a)` `(b)` 같은 inline 표기를 SEARCH/REPLACE로 제거
    - acceptance: paper.md에 `(a)` 0건, `(b)` 0건
    - verifier: rule
    - depends_on: subtask-1
    - model: claude/haiku-4-5

  - subtask-4: Results 재포맷
    - goal: `8/8 catch-rate` → `non-redundancy gates`
    - acceptance: paper.md에 `8/8` 0건, `non-redundancy` ≥ 1건
    - verifier: rule
    - depends_on: subtask-1
    - model: claude/haiku-4-5

  - subtask-5: 본문에 v0.13 키워드 추가
    - goal: Abstract 끝부분에 `(generated by agent-loop-cli v0.13)` 같은 메타 패치
    - acceptance: 본문에 `v0.13` 등장
    - verifier: rule
    - depends_on: subtask-1
    - model: claude/haiku-4-5

success_criteria:
  - axis: structure
    weight: 0.3
    rule: "`# `_count>=1; `## Abstract`_count>=1; `## Methods`_count>=1; `## Results`_count>=1; `## References`_count>=1"
    file: paper.md
  - axis: title_clean
    weight: 0.15
    rule: "`rough`_count==0"
    file: paper.md
  - axis: methods_clean
    weight: 0.15
    rule: "`(a)`_count==0; `(b)`_count==0"
    file: paper.md
  - axis: results_reframe
    weight: 0.2
    rule: "`8/8`_count==0; `non-redundancy` in"
    file: paper.md
  - axis: meta_keyword
    weight: 0.2
    rule: "`v0.13` in"
    file: paper.md

budget:
  max_cycles: 1
  max_redo: 0
  max_usd: 0.5
